name: CI and Release Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build release bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-dist
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build release bundle
        run: npm run build

      - name: Pack release artifact
        run: tar -czf openclaw-relay-${{ github.ref_name }}.tar.gz dist protocol README.md LICENSE

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: openclaw-relay-${{ github.ref_name }}.tar.gz
