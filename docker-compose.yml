services:
  relay-server:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    environment:
      RELAY_PORT: "8080"
      RELAY_HOST: "0.0.0.0"
      RELAY_ADMIN_TOKEN: "${RELAY_ADMIN_TOKEN:-changeme}"
      RELAY_JWT_SECRET: "${RELAY_JWT_SECRET:-changeme}"
    command: ["server", "--port", "8080", "--admin-token", "${RELAY_ADMIN_TOKEN:-changeme}", "--jwt-secret", "${RELAY_JWT_SECRET:-changeme}"]
    restart: unless-stopped

  relay-client:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    environment:
      RELAY_URL: "ws://relay-server:8080/ws"
      RELAY_TOKEN: "${RELAY_CLIENT_TOKEN}"
      RELAY_CLAW_ID: "${RELAY_CLAW_ID:-default-client}"
      RELAY_CAPABILITIES: "${RELAY_CAPABILITIES:-shell}"
    command: ["client", "--url", "ws://relay-server:8080/ws", "--token", "${RELAY_CLIENT_TOKEN}", "--claw-id", "${RELAY_CLAW_ID:-default-client}"]
    depends_on:
      - relay-server
    restart: unless-stopped
