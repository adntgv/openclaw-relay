services:
  relay-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  relay-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      relay-server:
        condition: service_healthy
    environment:
      RELAY_URL: ${RELAY_URL:-ws://relay-server:8080/ws}
      RELAY_TOKEN: ${RELAY_TOKEN:-}
      CLAW_ID: ${CLAW_ID:-local-client}
      CAPABILITIES: ${CAPABILITIES:-shell}
      CLIENT_VERSION: ${CLIENT_VERSION:-0.1.0}
